<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Arbeitszeiterfassung</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <style>
    body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 0; color: #333; }
    .container { max-width: 500px; margin: 0 auto; padding: 1em; background: #fff; min-height: 100vh; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    h1 { text-align: center; font-size: 1.5em; margin: 0.5em 0; color: #2c3e50; }
    
    /* Buttons & Farben - Bleiben wie gewünscht */
    .actions { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 20px; }
    .actions-row { display: flex; gap: 10px; width: 100%; justify-content: center; }
    button.kommen, button.gehen, button.frei, button.urlaub {
      flex: 1;
      max-width: 160px;
      padding: 15px 5px;
      font-size: 1.4em;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 3px 6px rgba(0,0,0,0.1);
    }
    .kommen { background: #5cb85c; color: white; }
    .gehen { background: #d9534f; color: white; }
    .frei { background: #ffe066; color: #665c00; }
    .urlaub { background: #8be08b; color: #155d15; }

    /* Tabellen-Design für Pixel 10 Pro */
    .table-wrapper { width: 100%; overflow-x: auto; margin-top: 15px; border: 1px solid #ddd; border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; min-width: 420px; font-size: 0.9em; table-layout: fixed; }
    th, td { border: 1px solid #ddd; padding: 10px 5px; text-align: center; vertical-align: middle; }
    th { background: #f8f9fa; font-weight: bold; }

    /* Breiten der Spalten fixieren für bessere Lesbarkeit */
    th:nth-child(1) { width: 35px; } /* Checkbox */
    th:nth-child(2) { width: 90px; } /* Tag */
    th:nth-child(3) { width: 60px; } /* Zeit */
    th:nth-child(4) { width: 75px; } /* Art */
    th:nth-child(5) { width: auto; } /* Notiz */
    th:nth-child(6) { width: 70px; } /* Aktion */

    /* Tag-Farben (Zebra-Look pro TAG) */
    .day-white { background-color: #ffffff; }
    .day-gray { background-color: #f9f9f9; }
    .frei-row td { background-color: #fff9c4 !important; }
    .urlaub-row td { background-color: #e8f9e7 !important; }
    
    /* Notiz-Umbruch Fix */
    .note-cell { 
      white-space: normal; 
      word-wrap: break-word; 
      overflow-wrap: anywhere; 
      text-align: left; 
      font-size: 0.85em;
      line-height: 1.2;
    }

    .tagstunden { font-size: 0.8em; color: #0056b3; font-weight: bold; display: block; margin-top: 4px; }

    /* UI Elemente */
    .controls-row { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; gap: 8px; }
    select { padding: 10px; border-radius: 8px; border: 1px solid #ccc; flex-grow: 1; font-size: 1em; background: #fff; }
    .summary { text-align: right; font-weight: bold; font-size: 1.2em; margin: 15px 0; color: #2c3e50; border-top: 2px solid #eee; padding-top: 10px; }

    .tools { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 20px; }
    .tools button, .tools label { 
      padding: 12px 5px; background: #fff; border: 1px solid #ccc; border-radius: 8px; 
      text-align: center; font-size: 0.9em; cursor: pointer; color: #333; font-weight: 500;
    }
    .btn-main { grid-column: span 2; background: #0275d8 !important; color: white !important; border: none !important; }

    /* Modals */
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; }
    .modal-content { background:white; padding:20px; border-radius:15px; width:90%; max-width:350px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    .modal-content input, .modal-content select, .modal-content textarea { width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; font-size: 1em; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="container">
  <h1>Arbeitszeit</h1>
  
  <div class="actions">
    <div class="actions-row">
      <button class="kommen" onclick="addQuick('Kommen')">Kommen</button>
      <button class="gehen" onclick="addQuick('Gehen')">Gehen</button>
    </div>
    <div class="actions-row">
      <button class="frei" onclick="openFT('Frei')">Frei</button>
      <button class="urlaub" onclick="openFT('Urlaub')">Urlaub</button>
    </div>
  </div>

  <div class="controls-row">
    <select id="monatSelect" onchange="changeMonth()"></select>
    <button onclick="bulkDelete()" style="padding: 10px; background: #f0ad4e; color:white; border:none; border-radius:8px; font-weight:bold;">Löschen (<span id="selCount">0</span>)</button>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th><input type="checkbox" onclick="toggleAll(this)"></th>
          <th>Tag</th>
          <th>Zeit</th>
          <th>Art</th>
          <th>Notiz</th>
          <th>Aktion</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div id="totalDisplay" class="summary">Summe: 0,00 h</div>

  <div class="tools">
    <button class="btn-main" onclick="openEdit(null)">+ Manueller Nachtrag</button>
    <button onclick="exportCSV()">CSV Export</button>
    <button onclick="exportPDF()">PDF Export</button>
    <label>CSV Import <input type="file" style="display:none" onchange="importCSV(event)"></label>
    <button onclick="clearMonth()" style="color:#d9534f">Monat leeren</button>
  </div>
</div>

<div id="editModal" class="modal" onclick="this.style.display='none'">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h3 id="modalTitle" style="margin-top:0">Eintrag bearbeiten</h3>
    <input type="date" id="edDate">
    <input type="time" id="edTime">
    <select id="edType">
      <option value="Kommen">Kommen</option>
      <option value="Gehen">Gehen</option>
      <option value="Frei">Frei</option>
      <option value="Urlaub">Urlaub</option>
    </select>
    <textarea id="edNote" placeholder="Notiz..."></textarea>
    <button onclick="saveEdit()" style="width:100%; padding:15px; background:#0275d8; color:white; border:none; border-radius:8px; font-weight:bold;">Speichern</button>
  </div>
</div>

<div id="ftModal" class="modal" onclick="this.style.display='none'">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h3 id="ftTitle">Zeitraum</h3>
    <label>Von:</label><input type="date" id="ftFrom">
    <label>Bis:</label><input type="date" id="ftTo">
    <button onclick="saveFT()" style="width:100%; padding:15px; background:#5cb85c; color:white; border:none; border-radius:8px; font-weight:bold; margin-top:10px;">Eintragen</button>
  </div>
</div>

<script>
  const CURRENT_KEY = 'arbeitszeit-entries';
  let entries = [];
  let selectedMonth = new Date().toISOString().slice(0, 7);
  let editIdx = null;
  let selectedRows = new Set();

  const DE_MONATE = ["Jan", "Feb", "Mär", "Apr", "Mai", "Jun", "Jul", "Aug", "Sep", "Okt", "Nov", "Dez"];
  const DE_TAGE = ["So", "Mo", "Di", "Mi", "Do", "Fr", "Sa"];

  function init() {
    try {
      const data = localStorage.getItem(CURRENT_KEY);
      if (data) entries = JSON.parse(data);
    } catch(e) { entries = []; }
    renderMonthSelect();
    render();
  }

  function save() { localStorage.setItem(CURRENT_KEY, JSON.stringify(entries)); }

  function renderMonthSelect() {
    const s = document.getElementById('monatSelect');
    let months = Array.from(new Set(entries.map(e => (e.date || "").slice(0,7)))).filter(m => m);
    if (!months.includes(selectedMonth)) months.push(selectedMonth);
    months.sort().reverse();
    s.innerHTML = '';
    months.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m;
      const [y, mo] = m.split('-');
      opt.textContent = DE_MONATE[parseInt(mo)-1] + " " + y;
      opt.selected = (m === selectedMonth);
      s.appendChild(opt);
    });
  }

  function render() {
    const body = document.getElementById('tableBody');
    body.innerHTML = '';
    const [y, m] = selectedMonth.split('-');
    const lastDay = new Date(y, m, 0).getDate();
    let totalMin = 0;
    let dayToggle = true; // Für Zebrastreifen pro Tag

    for (let d = 1; d <= lastDay; d++) {
      const dateStr = `${y}-${m}-${String(d).padStart(2, '0')}`;
      const dayData = entries.filter(e => e.date === dateStr).sort((a,b) => (a.time || "").localeCompare(b.time || ""));
      const dObj = new Date(dateStr);
      const label = `${String(d).padStart(2, '0')}.${m}. (${DE_TAGE[dObj.getDay()]})`;
      
      const dayClass = dayToggle ? 'day-white' : 'day-gray';
      dayToggle = !dayToggle; // Wechseln für den nächsten Tag

      if (dayData.length === 0) {
        body.innerHTML += `<tr class="${dayClass}" style="color:#bbb">
          <td></td><td>${label}</td><td colspan="3" style="font-style:italic; font-size:0.8em;">kein Eintrag</td>
          <td><button onclick="openEdit(null, '${dateStr}')" style="border:none; background:none; color:#0275d8; font-size:1.4em;">+</button></td>
        </tr>`;
      } else {
        const kommen = dayData.find(e => e.type === 'Kommen');
        const gehen = [...dayData].reverse().find(e => e.type === 'Gehen');
        let dayDiff = 0;
        if (kommen && gehen && kommen.time && gehen.time) {
          const t1 = kommen.time.split(':').map(Number);
          const t2 = gehen.time.split(':').map(Number);
          dayDiff = (t2[0]*60 + t2[1]) - (t1[0]*60 + t1[1]);
          if (dayDiff > 0) totalMin += dayDiff;
        }

        dayData.forEach((e, i) => {
          const realIdx = entries.indexOf(e);
          if (e.type === 'Urlaub') totalMin += 468;
          let rowClass = e.type === 'Frei' ? 'frei-row' : (e.type === 'Urlaub' ? 'urlaub-row' : dayClass);
          
          body.innerHTML += `<tr class="${rowClass}">
            <td><input type="checkbox" onchange="toggleRow(${realIdx})" ${selectedRows.has(realIdx) ? 'checked' : ''}></td>
            <td style="font-weight:${i===0?'bold':'normal'}; border-top:${i===0?'1px solid #999':'none'};">
                ${i === 0 ? label : ''}
            </td>
            <td>${e.time || ''}</td>
            <td>${e.type}</td>
            <td class="note-cell">${e.note || ''}</td>
            <td>
              <div style="display:flex; flex-direction:column; align-items:center; gap:5px;">
                  <button onclick="openEdit(${realIdx})" style="border:none; background:none; font-size:1.2em; padding:0;">✎</button>
                  ${i === 0 && dayDiff > 0 ? `<span class="tagstunden">${(dayDiff/60).toFixed(2).replace('.',',')}h</span>` : ''}
                  ${i === 0 && e.type === 'Urlaub' ? `<span class="tagstunden">7,80h</span>` : ''}
              </div>
            </td>
          </tr>`;
        });
      }
    }
    document.getElementById('totalDisplay').textContent = "Monatssumme: " + (totalMin/60).toFixed(2).replace('.', ',') + " h";
    document.getElementById('selCount').textContent = selectedRows.size;
  }

  function addQuick(type) {
    const now = new Date();
    let note = type === 'Gehen' ? (prompt("Notiz (optional)?") || "") : "";
    entries.push({ date: now.toISOString().slice(0, 10), time: now.toTimeString().slice(0, 5), type: type, note: note });
    save(); render(); renderMonthSelect();
  }

  function openEdit(idx, forceDate) {
    editIdx = idx;
    const e = idx !== null ? entries[idx] : { date: forceDate || new Date().toISOString().slice(0,10), time: "08:00", type: "Kommen", note: "" };
    document.getElementById('edDate').value = e.date;
    document.getElementById('edTime').value = e.time;
    document.getElementById('edType').value = e.type;
    document.getElementById('edNote').value = e.note || "";
    document.getElementById('editModal').style.display = 'flex';
  }

  function saveEdit() {
    const e = {
      date: document.getElementById('edDate').value,
      time: (document.getElementById('edType').value==='Frei'||document.getElementById('edType').value==='Urlaub') ? "" : document.getElementById('edTime').value,
      type: document.getElementById('edType').value,
      note: document.getElementById('edNote').value
    };
    if (editIdx === null) entries.push(e); else entries[editIdx] = e;
    save(); document.getElementById('editModal').style.display = 'none'; render(); renderMonthSelect();
  }

  function openFT(type) {
    document.getElementById('ftTitle').textContent = type;
    const d = new Date().toISOString().slice(0,10);
    document.getElementById('ftFrom').value = d;
    document.getElementById('ftTo').value = d;
    document.getElementById('ftModal').style.display = 'flex';
  }

  function saveFT() {
    const type = document.getElementById('ftTitle').textContent;
    let start = new Date(document.getElementById('ftFrom').value);
    const end = new Date(document.getElementById('ftTo').value);
    while(start <= end) {
      const ds = start.toISOString().slice(0,10);
      const isWE = start.getDay() === 0 || start.getDay() === 6;
      entries.push({ date: ds, time: "", type: isWE || type === "Frei" ? "Frei" : "Urlaub", note: "" });
      start.setDate(start.getDate() + 1);
    }
    save(); document.getElementById('ftModal').style.display = 'none'; render(); renderMonthSelect();
  }

  function toggleRow(idx) { if(selectedRows.has(idx)) selectedRows.delete(idx); else selectedRows.add(idx); render(); }
  function toggleAll(master) {
    if(master.checked) entries.forEach((e,i) => { if(e.date && e.date.startsWith(selectedMonth)) selectedRows.add(i); });
    else selectedRows.clear();
    render();
  }

  function bulkDelete() {
    if(selectedRows.size === 0) return;
    if(confirm("Ausgewählte Einträge wirklich löschen?")) {
      entries = entries.filter((_, i) => !selectedRows.has(i));
      selectedRows.clear(); save(); render(); renderMonthSelect();
    }
  }

  function changeMonth() { selectedMonth = document.getElementById('monatSelect').value; selectedRows.clear(); render(); }
  
  function clearMonth() {
    if(confirm("Diesen Monat wirklich leeren?") && prompt("Tippe LÖSCHEN") === "LÖSCHEN") {
      entries = entries.filter(e => e.date && !e.date.startsWith(selectedMonth));
      save(); render(); renderMonthSelect();
    }
  }

  function importCSV(ev) {
    const r = new FileReader();
    r.onload = (e) => {
      const rows = e.target.result.split("\n").slice(1);
      rows.forEach(line => {
        let f = line.split(/[;,]/).map(s => s.replace(/^["']|["']$/g, '').trim());
        if(f.length >= 3) {
          let d = f[0]; if(d.includes('.')) { let b = d.split('.'); d = `${b[2]}-${b[1]}-${b[0]}`; }
          entries.push({date: d, time: f[1], type: f[2], note: f[3] || ""});
        }
      });
      save(); render(); renderMonthSelect();
    };
    r.readAsText(ev.target.files[0]);
  }

  function exportCSV() {
    let csv = "Datum;Zeit;Art;Notiz\n" + entries.filter(e => e.date && e.date.startsWith(selectedMonth)).map(e => `${e.date};${e.time};${e.type};${e.note}`).join("\n");
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], {type: 'text/csv'}));
    a.download = `Arbeitszeit_${selectedMonth}.csv`;
    a.click();
  }

  function exportPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.text("Arbeitszeit " + selectedMonth, 10, 10);
    let y = 20;
    entries.filter(e => e.date && e.date.startsWith(selectedMonth)).forEach(e => {
      doc.text(`${e.date} | ${e.time} | ${e.type} | ${e.note}`, 10, y);
      y += 7;
      if(y > 280) { doc.addPage(); y = 10; }
    });
    doc.save(`Zeiten_${selectedMonth}.pdf`);
  }

  init();
</script>
</body>
</html>
